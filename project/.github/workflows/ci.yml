name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  app:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: toko_core_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, pdo_pgsql
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Composer deps
        run: composer install --no-interaction --prefer-dist

      - name: Install NPM deps
        run: npm ci

      - name: Prepare env
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          APP_ENV: testing

      - name: Migrate + seed
        run: php artisan migrate:fresh --seed
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: toko_core_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          TURNSTILE_ENABLED: false

      - name: Backend tests
        run: php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: toko_core_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          TURNSTILE_ENABLED: false

      - name: Frontend clean check
        run: npm run check:clean

      - name: Frontend lint
        run: npm run lint

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend build
        run: npm run build

      - name: Docs build
        run: npm run docs:build
